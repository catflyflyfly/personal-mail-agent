services:
  personal-mail-agent:
    image: ghcr.io/catflyflyfly/personal-mail-agent:latest
    # build: .  # uncomment to build locally instead of pulling from ghcr.io
    restart: unless-stopped
    depends_on:
      - spamassassin
    volumes:
      - ./config/agent.lua:/app/config.lua:ro
    networks:
      - internal

  spamassassin:
    image: instantlinux/spamassassin:latest
    restart: unless-stopped
    environment:
      - EXTRA_OPTIONS=--allow-tell
    volumes:
      - bayes_db:/var/lib/spamassassin
      - ./config/spamassassin:/etc/mail/spamassassin:ro
    networks:
      - internal

volumes:
  bayes_db:

networks:
  internal:
